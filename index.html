<!-- ========== TELA DE LOGIN ========== -->
<div id="loginScreen" class="login-screen">
    <img src="logo.png" alt="SE7VEN ENERGIA" onerror="this.style.display='none'">
    <h1>⚡ SE7VEN ENERGIA</h1>
    
    <!-- Login com usuário/senha -->
    <input type="text" id="loginUsuario" placeholder="Usuário" value="">
    <input type="password" id="loginSenha" placeholder="Senha" value="">
    <div id="loginError" class="error">❌ Usuário ou senha incorretos</div>
    <button onclick="fazerLogin()" style="background:#1a237e;color:white;width:100%;max-width:300px;padding:12px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;border:none;margin:5px auto;">🔑 Entrar</button>
    
    <div style="display:flex;align-items:center;width:100%;max-width:300px;margin:10px auto;">
        <div style="flex:1;border-bottom:1px solid #ddd;"></div>
        <span style="padding:0 10px;color:#999;font-size:12px;">ou</span>
        <div style="flex:1;border-bottom:1px solid #ddd;"></div>
    </div>
    
    <!-- Login com Google -->
    <button class="btn-google" onclick="loginGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#ffffff" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#ffffff" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#ffffff" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#ffffff" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Entrar com Google
    </button>
    
    <div style="color:#666;font-size:12px;margin-top:15px;text-align:center;max-width:300px;">
        <strong>Usuário padrão:</strong><br>
        admin / admin
    </div>
</div>
