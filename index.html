    <!-- ========== CONFIGURAÇÕES ========== -->
    <!-- ⚠️ As chaves estão no config.js (NÃO COMMITAR) -->
    <script src="config.js"></script>
    
    <!-- Fallback caso config.js não exista -->
    <script>
        if (typeof window.CONFIG === 'undefined') {
            console.warn('⚠️ config.js não encontrado!');
            console.log('💡 Crie o arquivo config.js com suas configurações');
            console.log('📋 Copie de config-template.js e preencha');
            
            // Tenta carregar do localStorage (fallback)
            const supabaseUrl = localStorage.getItem('supabase_url') || 'https://se7ven-energia.supabase.co';
            const supabaseKey = localStorage.getItem('supabase_key') || '';
            
            if (supabaseKey) {
                window.CONFIG = {
                    SUPABASE: {
                        url: supabaseUrl,
                        secretKey: supabaseKey,
                        publicKey: localStorage.getItem('supabase_public_key') || ''
                    }
                };
                console.log('✅ Configurações carregadas do localStorage');
            }
        }
    </script>
